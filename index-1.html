const slides=document.querySelectorAll('.slide');
let loaded=0;
function load_img(n){const i=document.getElementById('i'+n);if(img[n]){i.src=img[n];loaded++;if(loaded>=3)load.style.display='none'}}
load_img(1);load_img(2);load_img(3);
setTimeout(()=>{for(let i=4;i<=16;i++)load_img(i)},100);
for(let i=0;i<16;i++){const dot=document.createElement('div');dot.className='dot';if(i===0)dot.classList.add('active');dot.onclick=()=>slides[i].scrollIntoView({behavior:'smooth'});d.appendChild(dot)}
c.addEventListener('scroll',()=>{const n=Math.round(c.scrollTop/window.innerHeight);document.querySelectorAll('.dot').forEach((dot,i)=>dot.classList.toggle('active',i===n))},{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='ArrowDown')c.scrollTop+=window.innerHeight;if(e.key==='ArrowUp')c.scrollTop-=window.innerHeight});
</script>
